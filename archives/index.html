  position: absolute; width: 34%; height: 34%; top: 21%; left: 25%;

  border-radius: 55% 45% 48% 52% / 50% 55% 45% 50%;
  will-change: transform;
}
#life-loader .lf-burst {
  position: absolute; inset: 0; border: 1.5px solid #1C1D21;
  border-radius: 50%; opacity: 0;
  will-change: transform, opacity;

#life-loader.is-live .lf-body { animation: lf-breath var(--breath, 2.1s) infinite; }
#life-loader.is-live .lf-blob { animation: lf-morph var(--morph, 3.6s) cubic-bezier(.45, .05, .55, .95) infinite; }
